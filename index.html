<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #fdf5f6; margin: 0; 
        }
        .player-card { 
            background-color: #f1d3d6; width: 350px; padding: 20px; 
            border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        /* این استایل باعث میشه پلیر اسپاتیفای توی کادر قشنگ بشینه */
        iframe { border-radius: 12px; display: block; }
    </style>
</head>
<body>

<div class="player-card">
    <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/4rsZLZg5ufqKj4mBrTaxYu?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
</div>

</body>
</html>
