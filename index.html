<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #ffffff; /* بک‌گراند کاملاً سفید */
            margin: 0; 
        }
        
        .player-card { 
            background-color: #ffffff; /* حذف رنگ صورتی */
            width: 350px; 
            padding: 10px; 
            border-radius: 20px;
            display: flex; justify-content: center;
        }

        iframe { 
            border-radius: 12px; 
            display: block;
        }
    </style>
</head>
<body>

<div class="player-card">
    <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/4rsZLZg5ufqKj4mBrTaxYu?utm_source=generator&theme=0" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
</div>

</body>
</html>
