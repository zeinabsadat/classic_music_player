<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #fdf5f6; margin: 0; }
        
        .player-card {
            background-color: #f1d3d6;
            width: 300px;
            padding: 20px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .art-box {
            width: 100%;
            height: 220px;
            background: #ffffff;
            border-radius: 20px;
        }

        .controls { color: #6a3a3a; display: flex; flex-direction: column; gap: 10px; }
        
        /* استایل نوار پیشرفت */
        input[type=range] { width: 100%; cursor: pointer; accent-color: #6a3a3a; }

        .time-info { display: flex; justify-content: space-between; font-size: 12px; }

        .buttons { display: flex; justify-content: space-between; align-items: center; font-size: 24px; }
        
        button { background: none; border: none; color: #6a3a3a; cursor: pointer; }
    </style>
</head>
<body>

<div class="player-card">
    <div class="art-box"></div>
    
    <audio id="myAudio" src="آدرس_آهنگ_خودت.mp3"></audio>

    <div class="controls">
        <input type="range" id="progressBar" value="0" min="0" max="100">
        <div class="time-info">
            <span id="curr">0:00</span>
            <span id="dur">0:00</span>
        </div>
        
        <div class="buttons">
            <button>🔀</button>
            <button>⏮</button>
            <button id="playBtn">⏯</button>
            <button>⏭</button>
            <button>🔁</button>
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById("myAudio");
    const playBtn = document.getElementById("playBtn");

    playBtn.addEventListener("click", () => {
        if (audio.paused) audio.play();
        else audio.pause();
    });

    audio.addEventListener("timeupdate", () => {
        const progress = (audio.currentTime / audio.duration) * 100;
        document.getElementById("progressBar").value = progress;
        document.getElementById("curr").innerText = formatTime(audio.currentTime);
        document.getElementById("dur").innerText = formatTime(audio.duration);
    });

    function formatTime(s) {
        let m = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return m + ":" + (sec < 10 ? "0" : "") + sec;
    }
</script>

</body>
</html>
