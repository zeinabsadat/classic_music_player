<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #fdf5f6; margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        .player-card {
            background-color: #f1d3d6; width: 300px; padding: 25px;
            border-radius: 35px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        .cover-art-box {
            width: 100%; height: 220px; background-color: #ffffff;
            border-radius: 20px; display: flex; justify-content: center;
            align-items: center; color: #aaa; font-size: 14px;
        }

        .controls-container { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: #6a3a3a; }

        .time-info { display: flex; justify-content: space-between; color: #6a3a3a; font-size: 12px; }

        .buttons-container { display: flex; justify-content: center; gap: 30px; font-size: 32px; }
        
        button { background: none; border: none; color: #6a3a3a; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.7; }
    </style>
</head>
<body>

<div class="player-card">
    <div class="cover-art-box">Beethoven for Reading</div>
    
    <audio id="audioPlayer"></audio>

    <div class="controls-container">
        <input type="range" id="seekBar" value="0">
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
        
        <div class="buttons-container">
            <button id="prevBtn">⏮</button>
            <button id="playPauseBtn">▶</button>
            <button id="nextBtn">⏭</button>
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById("audioPlayer");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const seekBar = document.getElementById("seekBar");
    const currTime = document.getElementById("currentTime");
    const durTime = document.getElementById("duration");

    // لیست قطعات آرام بتهوون (لینک‌های قانونی Musopen)
    const playlist = [
        "https://ia800305.us.archive.org/29/items/BeethovenPianoSonataNo.14Moonlight1stMvt/Beethoven-Moonlight-Sonata-1st-Mvt.mp3",
        "https://ia800201.us.archive.org/30/items/BeethovenPathetiqueSonata2ndMvt/Beethoven-Pathetique-Sonata-2nd-Mvt.mp3"
    ];

    let index = 0;
    audio.src = playlist[index];

    function formatTime(s) {
        let m = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return m + ":" + (sec < 10 ? "0" : "") + sec;
    }

    playPauseBtn.addEventListener("click", () => {
        if (audio.paused) {
            audio.play();
            playPauseBtn.textContent = "⏸";
        } else {
            audio.pause();
            playPauseBtn.textContent = "▶";
        }
    });

    audio.addEventListener("timeupdate", () => {
        seekBar.value = (audio.currentTime / audio.duration) * 100;
        currTime.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener("loadedmetadata", () => {
        durTime.textContent = formatTime(audio.duration);
    });

    seekBar.addEventListener("input", () => {
        audio.currentTime = (seekBar.value / 100) * audio.duration;
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
        index = (index + 1) % playlist.length;
        audio.src = playlist[index];
        audio.play();
        playPauseBtn.textContent = "⏸";
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
        index = (index - 1 + playlist.length) % playlist.length;
        audio.src = playlist[index];
        audio.play();
        playPauseBtn.textContent = "⏸";
    });
</script>

</body>
</html>
