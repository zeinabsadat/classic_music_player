<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پلیر موسیقی ساده و شیک</title>
    <style>
        /* تنظیمات کلی صفحه برای وسط‌چین کردن */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fdf5f6; /* رنگ پس‌زمینه بسیار روشن */
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none; /* جلوگیری از انتخاب متن */
            user-select: none;
        }

        /* کانتینر اصلی پلیر (مطابق تصویر) */
        .player-card {
            background-color: #f1d3d6; /* رنگ صورتی ملایم قاب */
            width: 300px;
            padding: 25px;
            border-radius: 35px;
            box-shadow: 0 15px 35px rgba(106, 58, 58, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* بخش کاور آهنگ (مربع سفید) */
        .cover-art-box {
            width: 100%;
            height: 220px;
            background-color: #ffffff; /* رنگ سفید داخل قاب */
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ccc;
            overflow: hidden; /* برای اینکه اگر عکس گذاشتی بیرون نزند */
        }

        /* اگر بخواهی عکس کاور بگذاری، این استایل آن است */
        .cover-art-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* فعلا پنهان است */
        }

        /* بخش کنترل‌ها */
        .controls-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* نوار پیشرفت (SeekBar) سفارشی شده */
        .seekbar-container {
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            margin: 0;
            z-index: 2;
        }

        input[type=range]:focus {
            outline: none;
        }

        /* استایل دستگیره نوار (Knob) */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #6a3a3a; /* رنگ قهوه‌ای تیره */
            cursor: pointer;
            margin-top: -4px; /* تنظیم موقعیت عمودی */
            box-shadow: 0 0 2px rgba(0,0,0,0.2);
        }

        /* استایل خود نوار (Track) */
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #ffffff; /* بخش سفید نوار */
            border-radius: 2px;
        }

        /* استایل زمان (دقیقه:ثانیه) */
        .time-info {
            display: flex;
            justify-content: space-between;
            color: #6a3a3a;
            font-size: 12px;
            margin-top: -5px; /* کمی نزدیکتر به نوار */
        }

        /* کانتینر دکمه‌ها (سه دکمه اصلی) */
        .buttons-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px; /* فاصله بین دکمه‌ها */
            margin-top: 10px;
        }

        /* استایل کلی دکمه‌ها */
        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #6a3a3a; /* رنگ قهوه‌ای تیره آیکون‌ها */
            font-size: 24px;
            padding: 10px;
            transition: transform 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-btn:active {
            transform: scale(0.9); /* افکت فشردن دکمه */
        }

        /* دکمه پخش/توقف بزرگتر */
        .play-pause-btn {
            font-size: 32px;
        }

        /* آیکون‌های SVG برای دکمه‌ها (جایگزین دکمه‌های نامفهوم قبلی) */
        .icon {
            width: 1em;
            height: 1em;
            fill: currentColor;
        }

    </style>
</head>
<body>

<div class="player-card">
    <div class="cover-art-box" id="coverArt">
        <span>[ کاور ]</span>
    </div>

    <audio id="audioPlayer"></audio>

    <div class="controls-container">
        <div class="seekbar-container">
            <input type="range" id="seekBar" value="0">
        </div>
        
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>
        
        <div class="buttons-container">
            <button class="control-btn" id="prevBtn" title="آهنگ قبلی">
                <svg class="icon" viewBox="0 0 24 24"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z" /></svg>
            </button>
            
            <button class="control-btn play-pause-btn" id="playPauseBtn" title="پخش/توقف">
                <svg class="icon" id="playIcon" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z" /></svg>
                <svg class="icon" id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M14,19H18V5H14V19M6,19H10V5H6V19Z" /></svg>
            </button>
            
            <button class="control-btn" id="nextBtn" title="آهنگ بعدی">
                <svg class="icon" viewBox="0 0 24 24"><path d="M16,18H18V6H16V18M6,18L14.5,12L6,6V18Z" /></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById("audioPlayer");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const playIcon = document.getElementById("playIcon");
    const pauseIcon = document.getElementById("pauseIcon");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const seekBar = document.getElementById("seekBar");
    const currentTimeDisplay = document.getElementById("currentTime");
    const durationDisplay = document.getElementById("duration");

    // --- بخش مهم: لینک مستقیم آهنگ‌های خود را اینجا قرار دهید ---
    const playlist = [
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // لینک نمونه ۱
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", // لینک نمونه ۲
        "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"  // لینک نمونه ۳
    ];
    // ----------------------------------------------------------------

    let currentTrackIndex = 0;
    let isPlaying = false;

    // بارگذاری آهنگ اول
    loadTrack(currentTrackIndex);

    function loadTrack(index) {
        audio.src = playlist[index];
        audio.load();
        // بازنشانی نوار پیشرفت و زمان
        seekBar.value = 0;
        currentTimeDisplay.textContent = "0:00";
        durationDisplay.textContent = "0:00";
    }

    // عملکرد دکمه پخش/توقف
    playPauseBtn.addEventListener("click", togglePlay);

    function togglePlay() {
        if (audio.paused || audio.ended) {
            audio.play();
            isPlaying = true;
            playIcon.style.display = "none";
            pauseIcon.style.display = "block";
        } else {
            audio.pause();
            isPlaying = false;
            playIcon.style.display = "block";
            pauseIcon.style.display = "none";
        }
    }

    // عملکرد دکمه بعدی
    nextBtn.addEventListener("click", nextTrack);

    function nextTrack() {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        loadTrack(currentTrackIndex);
        if (isPlaying) audio.play(); // اگر در حال پخش بود، بعدی را هم پخش کن
    }

    // عملکرد دکمه قبلی
    prevBtn.addEventListener("click", prevTrack);

    function prevTrack() {
        // اگر بیشتر از ۳ ثانیه گذشته، آهنگ را از اول پخش کن، در غیر این صورت برو آهنگ قبلی
        if (audio.currentTime > 3) {
            audio.currentTime = 0;
        } else {
            currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            loadTrack(currentTrackIndex);
            if (isPlaying) audio.play();
        }
    }

    // به‌روزرسانی نوار پیشرفت و زمان در حین پخش
    audio.addEventListener("timeupdate", () => {
        if (!isNaN(audio.duration)) {
            const progress = (audio.currentTime / audio.duration) * 100;
            seekBar.value = progress;
            currentTimeDisplay.textContent = formatTime(audio.currentTime);
            durationDisplay.textContent = formatTime(audio.duration);
        }
    });

    // جابه‌جایی در آهنگ با کشیدن نوار پیشرفت
    seekBar.addEventListener("input", () => {
        const seekTo = audio.duration * (seekBar.value / 100);
        audio.currentTime = seekTo;
    });

    // پخش اتوماتیک آهنگ بعدی وقتی آهنگ فعلی تمام شد
    audio.addEventListener("ended", nextTrack);

    // فرمت کردن زمان (ثانیه به دقیقه:ثانیه)
    function formatTime(seconds) {
        let min = Math.floor(seconds / 60);
        let sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? "0" : ""}${sec}`;
    }

    // بارگذاری اطلاعات زمان کل آهنگ وقتی آماده شد
    audio.addEventListener("loadedmetadata", () => {
        durationDisplay.textContent = formatTime(audio.duration);
    });

</script>

</body>
</html>
