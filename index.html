<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پلیر بتهوون - مانیکا پای</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf5f6; /* رنگ زمینه بسیار روشن و ملایم */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .player-card {
            background-color: #f1d3d6; /* رنگ صورتی ملایم از تصویر */
            width: 330px;
            padding: 25px;
            border-radius: 35px; /* لبه‌های گرد دقیقاً مثل عکس */
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06); /* سایه نرم */
            box-sizing: border-box;
        }

        .art-box {
            width: 100%;
            height: 230px;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* بخش کنترل‌ها */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* نوار پیشرفت (SeekBar) */
        .progress-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }

        /* خودِ نوارِ SeekBar */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #ffffff; /* بخش سفید نوار */
            border-radius: 2px;
            cursor: pointer;
            margin: 0;
            z-index: 2;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #6a3a3a; /* رنگ قهوه‌ای تیره از تصویر */
            cursor: pointer;
            margin-top: -4px; /* تنظیم ارتفاع نقطه */
        }

        input[type=range]:focus {
            outline: none;
        }

        /* نوار رنگیِ پر شده (با CSS و جاوااسکریپت کنترل می‌شود) */
        .progress-bar-fill {
            height: 4px;
            background-color: #6a3a3a;
            border-radius: 2px;
            position: absolute;
            top: 0;
            left: 0;
            width: 0%; /* مقدار پیش‌فرض */
            z-index: 1;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6a3a3a;
        }

        /* دکمه‌ها */
        .buttons {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.9); /* افکت کلیک */
        }

        /* آیکون‌های SVG اختصاصی (کپی دقیق طرح) */
        .icon {
            width: 24px;
            height: 24px;
            fill: #6a3a3a; /* رنگ قهوه‌ای تیره آیکون‌ها */
        }

        .play-pause-btn .icon {
            width: 32px;
            height: 32px; /* دکمه پخش بزرگتر است */
        }

    </style>
</head>
<body>

<div class="player-card">
    <div class="art-box">
        </div>
    
    <audio id="myAudio"></audio>

    <div class="controls">
        <div class="progress-container">
            <input type="range" id="progressBar" value="0" min="0" max="100">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>

        <div class="time-info">
            <span id="curr">0:00</span>
            <span id="dur">0:00</span>
        </div>
        
        <div class="buttons">
            <button title="پخش تصادفی">
                <svg class="icon" viewBox="0 0 24 24"><path d="M14.83,13.41L13.42,14.82L16.59,18H14V20H20V14H18V16.59L14.83,13.41M10.59,9.17L5.41,4H4V6H5.41L9.17,9.83L10.59,8.41M4,18H5.41L14.83,8.59L18,11.76V10H20V16H14V14H16.59L11.76,18.83L10.59,17.41L12,16H10.41L4,18M4,4V6H6L4,4Z" /></svg>
            </button>
            
            <button title="آهنگ قبلی" onclick="prevTrack()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z" /></svg>
            </button>
            
            <button class="play-pause-btn" id="playPauseBtn" title="پخش/توقف">
                <svg class="icon" id="play-icon" viewBox="0 0 24 24"><path d="M8,5.14V19.14L19,12.14L8,5.14Z" /></svg>
                <svg class="icon" id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M14,19H18V5H14V19M6,19H10V5H6V19Z" /></svg>
            </button>
            
            <button title="آهنگ بعدی" onclick="nextTrack()">
                <svg class="icon" viewBox="0 0 24 24"><path d="M16,18H18V6H16V18M6,18L14.5,12L6,6V18Z" /></svg>
            </button>
            
            <button title="تکرار">
                <svg class="icon" viewBox="0 0 24 24"><path d="M2,5.27L3.28,4L20,20.72L18.73,22L15.65,18.92C14.5,19.61 13.19,20 11.77,20C7.38,20 3.77,16.42 3.77,12C3.77,10.24 4.35,8.61 5.31,7.28L2,4V5.27M12,4C16.39,4 20,7.58 20,12C20,13.43 19.61,14.75 18.92,15.9L17.5,14.47C17.81,13.71 18,12.88 18,12C18,8.69 15.31,6 12,6V9L8,5L12,1V4Z" /></svg>
            </button>
        </div>
    </div>
</div>

<script>
    const audio = document.getElementById("myAudio");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const playIcon = document.getElementById("play-icon");
    const pauseIcon = document.getElementById("pause-icon");
    const progressBar = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");
    const currentTimeDisplay = document.getElementById("curr");
    const durationTimeDisplay = document.getElementById("dur");
    
    // --- پلی‌لیست بتهوون ---
    const playlist = [
        "آدرس_لینک_مستقیم_آهنگ_اول.mp3", // مثل Moonlight Sonata
        "آدرس_لینک_مستقیم_آهنگ_دوم.mp3"  // مثل Pathetique Sonata
    ];
    let currentTrackIndex = 0;

    // بارگذاری آهنگ اول
    function loadTrack(index) {
        audio.src = playlist[index];
        audio.load();
    }

    loadTrack(currentTrackIndex);

    // کنترل پخش/توقف
    playPauseBtn.addEventListener("click", () => {
        if (audio.paused) {
            audio.play();
            playIcon.style.display = 'none';
            pauseIcon.style.display = 'block';
        } else {
            audio.pause();
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        }
    });

    // به‌روزرسانی نوار پیشرفت و زمان
    audio.addEventListener("timeupdate", () => {
        if (audio.duration) {
            const progress = (audio.currentTime / audio.duration) * 100;
            progressBar.value = progress;
            progressFill.style.width = progress + '%'; // پر کردن نوار
            
            currentTimeDisplay.innerText = formatTime(audio.currentTime);
            durationTimeDisplay.innerText = formatTime(audio.duration);
        }
    });

    // امکان کشیدن نوار پیشرفت (Seek)
    progressBar.addEventListener("input", () => {
        const seekTime = (progressBar.value / 100) * audio.duration;
        audio.currentTime = seekTime;
    });

    // آهنگ بعدی/قبلی
    function nextTrack() {
        currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
        loadTrack(currentTrackIndex);
        audio.play();
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
    }

    function prevTrack() {
        currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
        loadTrack(currentTrackIndex);
        audio.play();
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
    }

    // فرمت کردن زمان (ثانیه به دقیقه)
    function formatTime(s) {
        let min = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return min + ":" + (sec < 10 ? "0" : "") + sec;
    }

</script>

</body>
</html>
